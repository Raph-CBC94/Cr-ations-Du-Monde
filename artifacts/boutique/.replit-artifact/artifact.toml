kind = "web"
previewPath = "/"
title = "Boutique — Col Fleuri"
version = "1.0.0"
id = "artifacts/boutique"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26041

[services.development]
run = "pnpm --filter @workspace/boutique run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/boutique", "run", "build" ]
serve = "static"
publicDir = "artifacts/boutique/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26041"
BASE_PATH = "/"
